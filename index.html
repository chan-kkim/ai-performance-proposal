<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Protected</title>
<style>
  :root{ --bg:#0e1117; --ink:#e6edf3; --mut:#8b949e; --teal:#2dd4bf; --teal-d:#0d9488; --line:rgba(255,255,255,.08); --danger:#f0a3a3; }
  html,body{margin:0;height:100%}
  body{ font-family:system-ui,'DM Sans',sans-serif; color:var(--ink); background:radial-gradient(110% 110% at 50% -10%, #14303a 0%, var(--bg) 60%); }
  #lock{ position:fixed; inset:0; display:flex; align-items:center; justify-content:center; padding:20px }
  .card{ width:min(92vw,360px); text-align:center }
  .dot{ width:40px;height:40px;border-radius:10px;margin:0 auto 18px; background:linear-gradient(135deg,var(--teal),var(--teal-d)); display:flex;align-items:center;justify-content:center; color:#04231f;font-weight:700;font-size:18px }
  h1{ font-weight:600; font-size:20px; margin:0 0 6px }
  p{ margin:0 0 20px; color:var(--mut); font-size:13.5px }
  .row{ display:flex; gap:8px }
  #pw{ flex:1; min-width:0; padding:11px 13px; border-radius:8px; font-size:14.5px; color:var(--ink); background:#0b0e13; border:1px solid var(--line); outline:none; font-family:inherit }
  #pw:focus{ border-color:var(--teal) }
  #go{ padding:11px 17px; border-radius:8px; border:none; cursor:pointer; font-size:14px; font-weight:600; background:var(--teal); color:#04231f; font-family:inherit }
  #go:disabled{ opacity:.5; cursor:default }
  #eye{ display:inline-flex; align-items:center; justify-content:center; padding:0 12px; border-radius:8px; border:1px solid var(--line); cursor:pointer; background:#0b0e13; color:var(--mut); font-family:inherit }
  #eye:hover{ color:var(--teal); border-color:var(--teal) }
  #err{ color:var(--danger); font-size:12.5px; min-height:16px; margin-top:12px }
  .rem{ display:flex; align-items:center; gap:7px; justify-content:center; margin-top:14px; color:var(--mut); font-size:12.5px; cursor:pointer; user-select:none }
  .rem input{ accent-color:var(--teal); cursor:pointer }
</style>
</head>
<body>
<div id="lock"><div class="card">
  <div class="dot">G</div>
  <h1>Protected content</h1>
  <p>Enter the password to view</p>
  <div class="row">
    <input id="pw" type="password" placeholder="Password" autocomplete="off" spellcheck="false" autofocus>
    <button id="eye" type="button" title="Show password" aria-label="Show password"></button>
    <button id="go">Open</button>
  </div>
  <label class="rem"><input type="checkbox" id="rem"> Remember on this device</label>
  <div id="err"></div>
</div></div>

const KEYNAME = "deckpw_ai-performance-proposal";
const b64 = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));
async function deriveKey(pw, salt){
  const base = await crypto.subtle.importKey("raw", new TextEncoder().encode(pw), "PBKDF2", false, ["deriveKey"]);
  return crypto.subtle.deriveKey({ name:"PBKDF2", salt, iterations:ENC.iters, hash:"SHA-256" },
    base, { name:"AES-GCM", length:256 }, false, ["decrypt"]);
}
async function unlock(isAuto){
  const pw = document.getElementById("pw").value;
  const err = document.getElementById("err"), go = document.getElementById("go");
  if(!pw){ if(!isAuto) err.textContent="Enter the password."; return; }
  go.disabled = true; err.textContent = "";
  try{
    const key = await deriveKey(pw, b64(ENC.salt));
    const plain = await crypto.subtle.decrypt({ name:"AES-GCM", iv:b64(ENC.iv) }, key, b64(ENC.ct));
    const html = new TextDecoder().decode(plain);
    try{ if(document.getElementById("rem").checked) localStorage.setItem(KEYNAME, pw); else localStorage.removeItem(KEYNAME); }catch(_){}
    document.open(); document.write(html + '\n<script src="https://chan-kkim.github.io/track.js" defer><\/script>'); document.close();
    // single sign-on: pass the same password into the deck's own inner gate (if any)
    var _pw = pw;
    setTimeout(function(){ try{
      var i = document.querySelector('input[type=password]');
      if(i){ i.focus(); i.value = _pw;
        i.dispatchEvent(new Event('input',{bubbles:true}));
        i.dispatchEvent(new KeyboardEvent('keydown',{key:'Enter',keyCode:13,which:13,bubbles:true}));
        var b = document.querySelector('button'); if(b) b.click(); }
    }catch(e){} }, 500);
  }catch(e){
    go.disabled = false;
    if(isAuto){ try{ localStorage.removeItem(KEYNAME); }catch(_){} }
    else { err.textContent = "Incorrect password."; document.getElementById("pw").select(); }
  }
}
const EYE_ON  = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg>`;
const EYE_OFF = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20C5 20 1 12 1 12a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`;
var _eye = document.getElementById("eye"); _eye.innerHTML = EYE_OFF;
_eye.addEventListener("click", function(){
  var p = document.getElementById("pw");
  var show = p.type === "password";
  p.type = show ? "text" : "password";
  this.innerHTML = show ? EYE_ON : EYE_OFF;
  var label = show ? "Hide password" : "Show password";
  this.title = label; this.setAttribute("aria-label", label);
  p.focus();
});
document.getElementById("go").addEventListener("click", ()=>unlock(false));
document.getElementById("pw").addEventListener("keydown", e=>{ if(e.key==="Enter") unlock(false); });
(function(){ let s=null; try{ s=localStorage.getItem(KEYNAME); }catch(_){}; if(s){ document.getElementById("pw").value=s; document.getElementById("rem").checked=true; unlock(true); } })();
</script>
